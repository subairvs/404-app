{% extends "base.html" %}

{% block content %}
<div class="auth-container animate-fade-in">
  <div class="card glass w-full mx-auto" style="max-width: 400px;">
    
    <div class="text-center m-b-2">
      <i data-lucide="user-plus" style="width:48px;height:48px;color:var(--color-primary);margin:0 auto 1rem;"></i>
      <h2>Create an Account</h2>
      <p class="text-muted">Join 404 Care to easily book and manage your services.</p>
    </div>

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}

      {% for message in messages %}
      <div style="color:#ef4444;" class="m-b-1 text-sm">
        {{ message }}
      </div>
      {% endfor %}

      <div class="form-group m-b-1">
        <label class="text-muted block m-b-1">Username</label>
        <input type="text" name="username" class="input w-full" placeholder="Choose a username" required>
      </div>

      <div class="form-group m-b-1">
        <label class="text-muted block m-b-1">First Name</label>
        <input type="text" name="first_name" class="input w-full" placeholder="e.g. John">
      </div>

      <div class="form-group m-b-1">
        <label class="text-muted block m-b-1">Last Name</label>
        <input type="text" name="last_name" class="input w-full" placeholder="e.g. Doe">
      </div>

      <div class="form-group m-b-1">
        <label class="text-muted block m-b-1">Email</label>
        <input type="email" name="email" class="input w-full" placeholder="john@example.com" required>
      </div>

      <div class="form-group m-b-1">
        <label class="text-muted block m-b-1">Password</label>
        <input type="password" name="password" class="input w-full" placeholder="Create a strong password" required>
      </div>

      <div class="form-group m-b-1">
        <label class="text-muted block m-b-1">Confirm Password</label>
        <input type="password" name="password_confirm" class="input w-full" placeholder="Re-enter your password" required>
      </div>

      <button type="submit" class="btn btn-primary w-full m-t-1">
        Register
      </button>

    </form>

    <div class="text-center m-t-2 text-sm text-muted">
      Already have an account? 
      <a href="{% url 'login' %}">Log In</a>
    </div>

  </div>
</div>
{% endblock %}
